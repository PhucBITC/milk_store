spring.application.name=milkstore
server.port=8080

# MySQL connection
# MySQL username: root
# MySQL password: 123456
# Database/schema: milkstore
spring.datasource.url=jdbc:mysql://localhost:3306/milkstore?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Bangkok
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Let Hibernate create/update tables from JPA entities while developing.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
