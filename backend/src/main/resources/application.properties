spring.application.name=milkstore
server.port=8080

# SQL Server connection
# Server instance: .\SQLEXPRESS
# Database: MilkStore
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=MilkStore;encrypt=true;trustServerCertificate=true;authentication=SqlPassword
spring.datasource.username=sa
spring.datasource.password=sa123123
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# SQL Server Authentication is used here, so integratedSecurity=true is not needed.

# Let Hibernate create/update tables from JPA entities while developing.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
